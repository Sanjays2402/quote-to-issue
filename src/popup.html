<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Quote to Issue</title>
<link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
  </div>

  <header class="topbar glass">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7 8h7a4 4 0 0 1 0 8h-2"></path>
        <path d="M7 8v8"></path>
        <path d="M17 6l-2 2 2 2"></path>
      </svg>
      <span class="title">Quote to Issue</span>
    </div>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.96 19.35a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.04H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.65 8.96a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1.04-1.56V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.04 4.65a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.07.34.27.65.55.86.28.21.62.32.97.32H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15z"></path>
      </svg>
    </button>
  </header>

  <main id="root" class="content"></main>

  <footer class="footer">
    <span class="version">v0.1.0</span>
  </footer>

  <template id="tpl-empty">
    <div class="empty">
      <svg class="empty-art" viewBox="0 0 160 110" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="22" y="22" width="116" height="74" rx="14"></rect>
        <path d="M40 46h60"></path>
        <path d="M40 60h74"></path>
        <path d="M40 74h44"></path>
        <path d="M118 80l8 8 14-16"></path>
      </svg>
      <h2 class="empty-title">No quote captured</h2>
      <p class="empty-sub">Select text on any page, right-click, then choose <em>File as GitHub issue</em>.</p>
    </div>
  </template>

  <template id="tpl-form">
    <section class="form glass" data-form>
      <header class="form-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3l2.5 5.5L20 9.3l-4 3.9.9 5.6L12 16.2 7.1 18.8 8 13.2l-4-3.9 5.5-.8L12 3z"></path>
          </svg>
          <span class="meta-label">New issue</span>
        </div>
        <button class="chip-toggle" data-action="toggle-preview" type="button" aria-pressed="false" title="Toggle preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span>Preview</span>
        </button>
      </header>

      <div class="field">
        <label class="field-label" for="qti-repo">Repository</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5v-17z"></path>
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          </svg>
          <input id="qti-repo" name="repo" class="input" type="text" placeholder="owner/name" autocomplete="off" spellcheck="false" data-field="repo">
        </div>
        <p class="field-hint" data-field="repo-hint">e.g. <code>vercel/next.js</code></p>
      </div>

      <div class="field">
        <label class="field-label" for="qti-title">Title</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h10"></path>
          </svg>
          <input id="qti-title" name="title" class="input" type="text" placeholder="Issue title" data-field="title" maxlength="256">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="qti-labels">Labels</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12l9-9 9 9-9 9-9-9z"></path>
            <circle cx="9" cy="9" r="1.5"></circle>
          </svg>
          <input id="qti-labels" name="labels" class="input" type="text" placeholder="bug, docs, p1" autocomplete="off" spellcheck="false" data-field="labels">
        </div>
        <div class="chip-row" data-field="label-chips"></div>
      </div>

      <div class="preview" data-preview hidden>
        <span class="context-label">Body preview</span>
        <pre class="preview-body" data-field="preview-body"></pre>
      </div>

      <footer class="form-actions">
        <p class="hint inline-hint" data-field="submit-hint">Add a GitHub token in settings to enable submission.</p>
        <button class="btn primary" type="button" data-action="submit" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14"></path><path d="M13 5l7 7-7 7"></path>
          </svg>
          <span>Create issue</span>
        </button>
      </footer>
    </section>
  </template>

  <template id="tpl-settings">
    <section class="settings glass" data-settings>
      <header class="form-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="4" y="10" width="16" height="10" rx="2"></rect>
            <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
          </svg>
          <span class="meta-label">GitHub token</span>
        </div>
        <button class="icon-btn ghost" data-action="close-settings" title="Close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
          </svg>
        </button>
      </header>

      <p class="settings-blurb">Stored encrypted (AES-GCM) in <code>chrome.storage.local</code>. Use a fine-grained PAT scoped to <em>Issues: Read &amp; Write</em>.</p>

      <div class="token-status" data-field="token-status" data-state="empty">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text" data-field="token-status-text">No token saved</span>
      </div>

      <div class="field">
        <label class="field-label" for="qti-token">Personal access token</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="9" cy="12" r="4"></circle>
            <path d="M13 12h8"></path><path d="M18 12v3"></path><path d="M21 12v2"></path>
          </svg>
          <input id="qti-token" name="token" class="input" type="password" placeholder="ghp_… or github_pat_…" autocomplete="off" spellcheck="false" data-field="token">
          <button class="input-btn" type="button" data-action="reveal-token" aria-pressed="false" title="Show token" aria-label="Show token">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <p class="field-hint" data-field="token-hint">Token never leaves this machine.</p>
      </div>

      <footer class="form-actions">
        <button class="btn ghost" type="button" data-action="clear-token">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path>
            <path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path><path d="M9 7V4h6v3"></path>
          </svg>
          <span>Clear</span>
        </button>
        <button class="btn primary" type="button" data-action="save-token" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12l4 4 10-10"></path>
          </svg>
          <span>Save</span>
        </button>
      </footer>
    </section>
  </template>

  <template id="tpl-quote">
    <section class="quote glass">
      <header class="quote-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 7h6"></path><path d="M9 11h6"></path><path d="M9 15h4"></path>
            <rect x="4" y="3" width="16" height="18" rx="3"></rect>
          </svg>
          <span class="meta-label">Captured quote</span>
        </div>
        <button class="icon-btn ghost" data-action="clear" title="Clear" aria-label="Clear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
          </svg>
        </button>
      </header>

      <blockquote class="quote-body" data-field="selectionText"></blockquote>

      <div class="context" data-context hidden>
        <span class="context-label">Context</span>
        <p class="context-text"><span class="dim" data-field="contextBefore"></span> <span class="hi" data-field="hi"></span> <span class="dim" data-field="contextAfter"></span></p>
      </div>

      <dl class="source">
        <div class="row"><dt>Page</dt><dd><a data-field="pageLink" target="_blank" rel="noopener noreferrer"></a></dd></div>
        <div class="row heading-row" data-heading-row hidden><dt>Section</dt><dd data-field="nearestHeading"></dd></div>
        <div class="row"><dt>Captured</dt><dd data-field="capturedAtPretty"></dd></div>
      </dl>
    </section>
  </template>

  <template id="tpl-success">
    <section class="success glass" data-success>
      <div class="success-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 12.5l2.5 2.5L16 9.5"></path>
        </svg>
      </div>
      <h2 class="success-title">Issue filed</h2>
      <p class="success-sub" data-field="success-sub"></p>
      <div class="success-actions">
        <a class="btn primary" target="_blank" rel="noopener noreferrer" data-field="success-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 4h6v6"></path><path d="M20 4l-9 9"></path>
            <path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"></path>
          </svg>
          <span>Open issue</span>
        </a>
        <button class="btn ghost" type="button" data-action="file-another">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14"></path><path d="M5 12h14"></path>
          </svg>
          <span>File another</span>
        </button>
      </div>
    </section>
  </template>

  <script type="module" src="popup.js"></script>
</body>
</html>
