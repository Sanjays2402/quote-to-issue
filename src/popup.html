<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Quote to Issue</title>
<link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
  </div>

  <header class="topbar glass">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7 8h7a4 4 0 0 1 0 8h-2"></path>
        <path d="M7 8v8"></path>
        <path d="M17 6l-2 2 2 2"></path>
      </svg>
      <span class="title">Quote to Issue</span>
    </div>
    <div class="topbar-actions">
    <button id="theme-btn" class="icon-btn theme-btn" type="button" data-theme-mode="system" title="Theme: follow system" aria-label="Theme: follow system">
      <svg class="theme-icon theme-icon-system" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="13" rx="2"></rect>
        <path d="M8 21h8"></path>
        <path d="M12 17v4"></path>
      </svg>
      <svg class="theme-icon theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path>
        <path d="M12 20v2"></path>
        <path d="M4.93 4.93l1.41 1.41"></path>
        <path d="M17.66 17.66l1.41 1.41"></path>
        <path d="M2 12h2"></path>
        <path d="M20 12h2"></path>
        <path d="M4.93 19.07l1.41-1.41"></path>
        <path d="M17.66 6.34l1.41-1.41"></path>
      </svg>
      <svg class="theme-icon theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8z"></path>
      </svg>
    </button>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.96 19.35a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.04H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.65 8.96a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1.04-1.56V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.04 4.65a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.07.34.27.65.55.86.28.21.62.32.97.32H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15z"></path>
      </svg>
    </button>
    </div>
  </header>

  <main id="root" class="content"></main>

  <footer class="footer">
    <span class="version">v0.1.0</span>
  </footer>

  <template id="tpl-empty">
    <div class="empty">
      <svg class="empty-art" viewBox="0 0 160 110" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="22" y="22" width="116" height="74" rx="14"></rect>
        <path d="M40 46h60"></path>
        <path d="M40 60h74"></path>
        <path d="M40 74h44"></path>
        <path d="M118 80l8 8 14-16"></path>
      </svg>
      <h2 class="empty-title">No quote captured</h2>
      <p class="empty-sub">Select text on any page, right-click, then choose <em>File as GitHub issue</em>.</p>
    </div>
  </template>

  <template id="tpl-form">
    <section class="form glass" data-form>
      <header class="form-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3l2.5 5.5L20 9.3l-4 3.9.9 5.6L12 16.2 7.1 18.8 8 13.2l-4-3.9 5.5-.8L12 3z"></path>
          </svg>
          <span class="meta-label">New issue</span>
        </div>
        <button class="chip-toggle" data-action="toggle-preview" type="button" aria-pressed="false" title="Toggle preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span>Preview</span>
        </button>
      </header>

      <div class="field">
        <label class="field-label" for="qti-repo">Repository</label>
        <div class="repo-combo" data-field="repo-combo">
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5v-17z"></path>
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            </svg>
            <input id="qti-repo" name="repo" class="input" type="text" placeholder="owner/name" autocomplete="off" spellcheck="false" data-field="repo" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="qti-repo-recents">
            <button class="input-btn repo-recents-toggle" type="button" data-action="toggle-recents" aria-label="Show recent repositories" aria-pressed="false" title="Recent repositories" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6 9l6 6 6-6"></path>
              </svg>
            </button>
          </div>
          <div id="qti-repo-recents" class="repo-recents glass" data-field="repo-recents" role="listbox" hidden></div>
        </div>
        <p class="field-hint" data-field="repo-hint">e.g. <code>vercel/next.js</code></p>
      </div>

      <div class="field">
        <label class="field-label" for="qti-title">Title</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h10"></path>
          </svg>
          <input id="qti-title" name="title" class="input" type="text" placeholder="Issue title" data-field="title" maxlength="256">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="qti-labels">Labels</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12l9-9 9 9-9 9-9-9z"></path>
            <circle cx="9" cy="9" r="1.5"></circle>
          </svg>
          <input id="qti-labels" name="labels" class="input" type="text" placeholder="bug, docs, p1" autocomplete="off" spellcheck="false" data-field="labels">
        </div>
        <div class="chip-row" data-field="label-chips"></div>
      </div>

      <div class="field">
        <div class="template-head">
          <button class="chip-toggle template-toggle" type="button" data-action="toggle-template" aria-expanded="false" title="Issue template for this repo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="4" y="3" width="16" height="18" rx="3"></rect>
              <path d="M8 8h8"></path><path d="M8 12h8"></path><path d="M8 16h5"></path>
            </svg>
            <span>Template</span>
            <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
          </button>
          <span class="template-status" data-field="template-status" data-state="empty">Enter a repo to manage its template.</span>
        </div>
        <div class="template-block" data-template-block hidden>
          <textarea class="input template-body" data-field="template-body" rows="7" spellcheck="false" placeholder="Issue body template for this repo. Use {{quote_blockquote}}, {{source_url}}, etc." maxlength="8000"></textarea>
          <p class="field-hint" data-field="template-hint">Placeholders: {{quote}}, {{quote_blockquote}}, {{source_title}}, {{source_url}}, {{section}}, {{captured}}, {{screenshot_note}}.</p>
          <div class="template-actions">
            <button class="btn ghost btn-sm" type="button" data-action="insert-default-template" title="Insert default template">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12h16"></path><path d="M12 4v16"></path></svg>
              <span>Default</span>
            </button>
            <button class="btn ghost btn-sm" type="button" data-action="clear-template" disabled title="Remove template for this repo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path></svg>
              <span>Remove</span>
            </button>
            <button class="btn primary btn-sm" type="button" data-action="save-template" disabled title="Save template for this repo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12l4 4 10-10"></path></svg>
              <span>Save template</span>
            </button>
          </div>
        </div>
      </div>

      <div class="preview" data-preview hidden>
        <header class="preview-head">
          <span class="context-label">Body preview</span>
          <div class="preview-tabs" role="tablist" aria-label="Preview mode">
            <button class="preview-tab" type="button" role="tab" data-action="preview-mode" data-mode="rendered" aria-selected="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5h16"></path><path d="M4 12h10"></path><path d="M4 19h16"></path></svg>
              <span>Rendered</span>
            </button>
            <button class="preview-tab" type="button" role="tab" data-action="preview-mode" data-mode="source" aria-selected="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 7l-5 5 5 5"></path><path d="M15 7l5 5-5 5"></path></svg>
              <span>Source</span>
            </button>
          </div>
        </header>
        <div class="preview-rendered markdown" data-field="preview-rendered" aria-live="polite"></div>
        <pre class="preview-body" data-field="preview-body" hidden></pre>
      </div>

      <p class="draft-status" data-field="draft-status" hidden></p>

      <footer class="form-actions">
        <p class="hint inline-hint" data-field="submit-hint">Add a GitHub token in settings to enable submission.</p>
        <button class="btn ghost btn-sm" type="button" data-action="save-draft" title="Save this issue locally to finish later">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 4h11l4 4v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"></path>
            <path d="M8 4v5h8"></path>
            <path d="M8 14h8"></path><path d="M8 18h5"></path>
          </svg>
          <span>Save draft</span>
        </button>
        <button class="btn primary" type="button" data-action="submit" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14"></path><path d="M13 5l7 7-7 7"></path>
          </svg>
          <span>Create issue</span>
        </button>
      </footer>
    </section>
  </template>

  <template id="tpl-bulk">
    <section class="bulk glass" data-bulk>
      <header class="bulk-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="13" height="13" rx="2"></rect>
            <rect x="8" y="9" width="13" height="13" rx="2"></rect>
          </svg>
          <span class="meta-label">Issue batch</span>
          <span class="bulk-count" data-field="bulk-count"></span>
        </div>
        <button class="icon-btn ghost" type="button" data-action="clear-bulk" title="Clear batch" aria-label="Clear batch">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path>
          </svg>
        </button>
      </header>

      <ul class="bulk-list" data-bulk-list role="list"></ul>

      <div class="field">
        <label class="field-label" for="qti-bulk-repo">Repository (for all)</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5v-17z"></path>
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          </svg>
          <input id="qti-bulk-repo" name="bulk-repo" class="input" type="text" placeholder="owner/name" autocomplete="off" spellcheck="false" data-field="bulk-repo">
        </div>
        <p class="field-hint" data-field="bulk-repo-hint">All selected quotes will be filed against this repo.</p>
      </div>

      <div class="field">
        <label class="field-label" for="qti-bulk-labels">Labels</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12l9-9 9 9-9 9-9-9z"></path>
            <circle cx="9" cy="9" r="1.5"></circle>
          </svg>
          <input id="qti-bulk-labels" name="bulk-labels" class="input" type="text" placeholder="bug, docs" autocomplete="off" spellcheck="false" data-field="bulk-labels">
        </div>
      </div>

      <div class="bulk-progress" data-field="bulk-progress" hidden>
        <div class="bulk-progress-bar"><span class="bulk-progress-fill" data-field="bulk-progress-fill"></span></div>
        <span class="bulk-progress-label" data-field="bulk-progress-label"></span>
      </div>

      <p class="field-hint error" data-field="bulk-error" hidden></p>

      <footer class="form-actions">
        <p class="hint inline-hint" data-field="bulk-hint">Right-click selections and choose <em>Add to issue batch</em> to queue more.</p>
        <button class="btn primary" type="button" data-action="file-bulk" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14"></path><path d="M13 5l7 7-7 7"></path>
          </svg>
          <span data-field="bulk-submit-label">File all</span>
        </button>
      </footer>
    </section>
  </template>

  <template id="tpl-bulk-row">
    <li class="bulk-row" role="listitem">
      <span class="bulk-row-status" data-field="bulk-row-status" data-state="pending" aria-hidden="true">
        <svg class="bulk-row-icon pending" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle></svg>
      </span>
      <div class="bulk-row-body">
        <div class="bulk-row-meta">
          <span class="bulk-row-host" data-field="bulk-row-host"></span>
          <span class="bulk-row-section" data-field="bulk-row-section"></span>
        </div>
        <p class="bulk-row-snippet" data-field="bulk-row-snippet"></p>
        <a class="bulk-row-link" data-field="bulk-row-link" target="_blank" rel="noopener noreferrer" hidden></a>
      </div>
      <button class="bulk-row-remove" type="button" data-action="remove-bulk" aria-label="Remove from batch" title="Remove from batch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
        </svg>
      </button>
    </li>
  </template>

  <template id="tpl-drafts">
    <section class="drafts glass" data-drafts>
      <header class="drafts-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 4h11l4 4v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"></path>
            <path d="M8 4v5h8"></path>
          </svg>
          <span class="meta-label">Saved drafts</span>
        </div>
        <span class="drafts-count" data-field="drafts-count"></span>
      </header>
      <ul class="drafts-list" data-drafts-list role="list"></ul>
    </section>
  </template>

  <template id="tpl-draft-row">
    <li class="draft-row" role="listitem">
      <button class="draft-load" type="button" data-action="load-draft" title="Resume this draft">
        <span class="draft-title" data-field="draft-title"></span>
        <span class="draft-meta">
          <span class="draft-repo" data-field="draft-repo"></span>
          <span class="draft-dot" aria-hidden="true"></span>
          <span class="draft-time" data-field="draft-time"></span>
        </span>
        <span class="draft-snippet" data-field="draft-snippet"></span>
      </button>
      <button class="draft-remove" type="button" data-action="delete-draft" aria-label="Delete draft" title="Delete draft">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path>
        </svg>
      </button>
    </li>
  </template>

  <template id="tpl-settings">
    <section class="settings glass" data-settings>
      <header class="form-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="4" y="10" width="16" height="10" rx="2"></rect>
            <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
          </svg>
          <span class="meta-label">GitHub token</span>
        </div>
        <button class="icon-btn ghost" data-action="close-settings" title="Close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
          </svg>
        </button>
      </header>

      <p class="settings-blurb">Stored encrypted (AES-GCM) in <code>chrome.storage.local</code>. Use a fine-grained PAT scoped to <em>Issues: Read &amp; Write</em>.</p>

      <div class="token-status" data-field="token-status" data-state="empty">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text" data-field="token-status-text">No token saved</span>
      </div>

      <div class="field">
        <label class="field-label" for="qti-token">Personal access token</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="9" cy="12" r="4"></circle>
            <path d="M13 12h8"></path><path d="M18 12v3"></path><path d="M21 12v2"></path>
          </svg>
          <input id="qti-token" name="token" class="input" type="password" placeholder="ghp_… or github_pat_…" autocomplete="off" spellcheck="false" data-field="token">
          <button class="input-btn" type="button" data-action="reveal-token" aria-pressed="false" title="Show token" aria-label="Show token">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <p class="field-hint" data-field="token-hint">Token never leaves this machine.</p>
      </div>

      <div class="settings-divider" role="separator" aria-hidden="true"></div>

      <div class="capture-block" data-capture-block>
        <div class="capture-head">
          <div class="quote-meta">
            <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7h16"></path><path d="M4 12h10"></path><path d="M4 17h7"></path>
              <path d="M16 14l4 3-4 3"></path>
            </svg>
            <span class="meta-label">Surrounding context</span>
          </div>
          <button class="chip-toggle" type="button" data-action="toggle-context" aria-pressed="true" title="Capture text around the selection">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="7" width="18" height="10" rx="5"></rect>
              <circle cx="9" cy="12" r="3" data-field="context-knob"></circle>
            </svg>
            <span data-field="context-toggle-label">On</span>
          </button>
        </div>
        <p class="settings-blurb">Pull the paragraph around your selection so issues have the surrounding sentence, not just the snippet.</p>
        <div class="field capture-range" data-context-range>
          <label class="field-label" for="qti-context-radius">
            Radius
            <span class="range-value" data-field="context-radius-value">240</span>
            <span class="range-unit">chars each side</span>
          </label>
          <input id="qti-context-radius" class="range" type="range" min="0" max="600" step="20" value="240" data-field="context-radius">
          <div class="range-ticks" aria-hidden="true">
            <span>0</span><span>200</span><span>400</span><span>600</span>
          </div>
        </div>
      </div>

      <footer class="form-actions">
        <button class="btn ghost" type="button" data-action="clear-token">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path>
            <path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path><path d="M9 7V4h6v3"></path>
          </svg>
          <span>Clear</span>
        </button>
        <button class="btn primary" type="button" data-action="save-token" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12l4 4 10-10"></path>
          </svg>
          <span>Save</span>
        </button>
      </footer>
    </section>
  </template>

  <template id="tpl-quote">
    <section class="quote glass">
      <header class="quote-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 7h6"></path><path d="M9 11h6"></path><path d="M9 15h4"></path>
            <rect x="4" y="3" width="16" height="18" rx="3"></rect>
          </svg>
          <span class="meta-label">Captured quote</span>
        </div>
        <button class="icon-btn ghost" data-action="clear" title="Clear" aria-label="Clear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
          </svg>
        </button>
      </header>

      <blockquote class="quote-body" data-field="selectionText"></blockquote>

      <figure class="shot" data-shot hidden>
        <div class="shot-frame">
          <img class="shot-img" data-field="shotImg" alt="Captured screenshot of the page" />
          <div class="shot-overlay">
            <button class="shot-btn" type="button" data-action="copy-shot" title="Copy screenshot to clipboard" aria-label="Copy screenshot">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                <path d="M5 15V6a2 2 0 0 1 2-2h9"></path>
              </svg>
              <span>Copy</span>
            </button>
            <button class="shot-btn" type="button" data-action="download-shot" title="Download screenshot" aria-label="Download screenshot">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 4v12"></path><path d="M7 11l5 5 5-5"></path><path d="M5 20h14"></path>
              </svg>
              <span>PNG</span>
            </button>
          </div>
        </div>
        <figcaption class="shot-caption" data-field="shotCaption"></figcaption>
      </figure>

      <div class="context" data-context hidden>
        <span class="context-label">Context</span>
        <p class="context-text"><span class="dim" data-field="contextBefore"></span> <span class="hi" data-field="hi"></span> <span class="dim" data-field="contextAfter"></span></p>
      </div>

      <dl class="source">
        <div class="row"><dt>Page</dt><dd><a data-field="pageLink" target="_blank" rel="noopener noreferrer"></a></dd></div>
        <div class="row heading-row" data-heading-row hidden><dt>Section</dt><dd data-field="nearestHeading"></dd></div>
        <div class="row byline-row" data-byline-row hidden><dt>Author</dt><dd data-field="author"></dd></div>
        <div class="row published-row" data-published-row hidden><dt>Published</dt><dd data-field="publishedAt"></dd></div>
        <div class="row"><dt>Captured</dt><dd data-field="capturedAtPretty"></dd></div>
      </dl>
    </section>
  </template>

  <template id="tpl-success">
    <section class="success glass" data-success>
      <div class="success-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 12.5l2.5 2.5L16 9.5"></path>
        </svg>
      </div>
      <h2 class="success-title">Issue filed</h2>
      <p class="success-sub" data-field="success-sub"></p>
      <div class="success-actions">
        <a class="btn primary" target="_blank" rel="noopener noreferrer" data-field="success-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 4h6v6"></path><path d="M20 4l-9 9"></path>
            <path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"></path>
          </svg>
          <span>Open issue</span>
        </a>
        <button class="btn ghost" type="button" data-action="file-another">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14"></path><path d="M5 12h14"></path>
          </svg>
          <span>File another</span>
        </button>
      </div>
    </section>
  </template>

  <template id="tpl-recent-issues">
    <section class="recent-issues glass" data-recent-issues>
      <header class="recent-issues-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"></circle>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span class="meta-label">Recent issues</span>
        </div>
        <div class="recent-issues-actions">
          <span class="recent-issues-count" data-field="recent-issues-count"></span>
          <button class="icon-btn ghost" type="button" data-action="clear-recent-issues" title="Clear history" aria-label="Clear history">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path>
              <path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path>
            </svg>
          </button>
        </div>
      </header>
      <ul class="recent-issues-list" data-recent-issues-list role="list"></ul>
    </section>
  </template>

  <template id="tpl-recent-issue-row">
    <li class="recent-issue-row" role="listitem">
      <a class="recent-issue-link" data-field="recent-issue-link">
        <span class="recent-issue-title" data-field="recent-issue-title"></span>
        <span class="recent-issue-meta">
          <span class="recent-issue-repo" data-field="recent-issue-repo"></span>
          <span class="recent-issue-number" data-field="recent-issue-number"></span>
          <span class="draft-dot" aria-hidden="true"></span>
          <span class="recent-issue-time" data-field="recent-issue-time"></span>
        </span>
      </a>
      <button class="recent-issue-remove" type="button" data-action="remove-recent-issue" aria-label="Remove from history" title="Remove from history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
        </svg>
      </button>
    </li>
  </template>

  <script type="module" src="popup.js"></script>
</body>
</html>
