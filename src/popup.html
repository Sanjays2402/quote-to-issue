<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Quote to Issue</title>
<link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
  </div>

  <header class="topbar glass">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7 8h7a4 4 0 0 1 0 8h-2"></path>
        <path d="M7 8v8"></path>
        <path d="M17 6l-2 2 2 2"></path>
      </svg>
      <span class="title">Quote to Issue</span>
    </div>
    <div class="topbar-actions">
    <button id="theme-btn" class="icon-btn theme-btn" type="button" data-theme-mode="system" title="Theme: follow system" aria-label="Theme: follow system">
      <svg class="theme-icon theme-icon-system" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="13" rx="2"></rect>
        <path d="M8 21h8"></path>
        <path d="M12 17v4"></path>
      </svg>
      <svg class="theme-icon theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path>
        <path d="M12 20v2"></path>
        <path d="M4.93 4.93l1.41 1.41"></path>
        <path d="M17.66 17.66l1.41 1.41"></path>
        <path d="M2 12h2"></path>
        <path d="M20 12h2"></path>
        <path d="M4.93 19.07l1.41-1.41"></path>
        <path d="M17.66 6.34l1.41-1.41"></path>
      </svg>
      <svg class="theme-icon theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8z"></path>
      </svg>
    </button>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.96 19.35a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.04H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.65 8.96a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1.04-1.56V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.04 4.65a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.07.34.27.65.55.86.28.21.62.32.97.32H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15z"></path>
      </svg>
    </button>
    </div>
  </header>

  <main id="root" class="content"></main>

  <div id="toast-host" class="toast-host" aria-live="polite" aria-atomic="true"></div>

  <template id="tpl-toast">
    <div class="toast glass" role="status" data-toast>
      <div class="toast-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 12.5l2.5 2.5L16 9.5"></path>
        </svg>
      </div>
      <div class="toast-body">
        <p class="toast-title" data-field="toast-title">Issue filed</p>
        <p class="toast-sub" data-field="toast-sub"></p>
      </div>
      <div class="toast-actions">
        <button class="toast-btn" type="button" data-action="toast-copy" title="Copy link" aria-label="Copy link">
          <svg class="toast-icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="12" height="12" rx="2"></rect>
            <path d="M5 15V5a2 2 0 0 1 2-2h10"></path>
          </svg>
          <svg class="toast-icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12.5l4 4L19 7"></path>
          </svg>
          <span class="toast-btn-label" data-field="toast-copy-label">Copy link</span>
        </button>
        <button class="toast-btn primary" type="button" data-action="toast-open" title="Open in new tab" aria-label="Open in new tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 4h6v6"></path><path d="M20 4l-9 9"></path>
            <path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"></path>
          </svg>
          <span class="toast-btn-label">Open</span>
        </button>
        <button class="toast-close" type="button" data-action="toast-close" title="Dismiss" aria-label="Dismiss">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 6l12 12"></path><path d="M18 6l-12 12"></path>
          </svg>
        </button>
      </div>
      <span class="toast-progress" data-field="toast-progress" aria-hidden="true"></span>
    </div>
  </template>

  <footer class="footer">
    <span class="version">v0.1.0</span>
  </footer>

  <template id="tpl-empty">
    <div class="empty">
      <svg class="empty-art" viewBox="0 0 160 110" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="22" y="22" width="116" height="74" rx="14"></rect>
        <path d="M40 46h60"></path>
        <path d="M40 60h74"></path>
        <path d="M40 74h44"></path>
        <path d="M118 80l8 8 14-16"></path>
      </svg>
      <h2 class="empty-title">No quote captured</h2>
      <p class="empty-sub">Select text on any page, right-click, then choose <em>File as GitHub issue</em>.</p>
    </div>
  </template>

  <template id="tpl-form">
    <section class="form glass" data-form>
      <header class="form-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3l2.5 5.5L20 9.3l-4 3.9.9 5.6L12 16.2 7.1 18.8 8 13.2l-4-3.9 5.5-.8L12 3z"></path>
          </svg>
          <span class="meta-label">New issue</span>
        </div>
        <button class="chip-toggle" data-action="toggle-preview" type="button" aria-pressed="false" title="Toggle preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span>Preview</span>
        </button>
      </header>

      <div class="field">
        <label class="field-label" for="qti-repo">Repository</label>
        <div class="repo-combo" data-field="repo-combo">
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5v-17z"></path>
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            </svg>
            <input id="qti-repo" name="repo" class="input" type="text" placeholder="owner/name" autocomplete="off" spellcheck="false" data-field="repo" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="qti-repo-recents">
            <button class="input-btn repo-recents-toggle" type="button" data-action="toggle-recents" aria-label="Show recent repositories" aria-pressed="false" title="Recent repositories" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6 9l6 6 6-6"></path>
              </svg>
            </button>
          </div>
          <div id="qti-repo-recents" class="repo-recents glass" data-field="repo-recents" role="listbox" hidden></div>
        </div>
        <p class="field-hint" data-field="repo-hint">e.g. <code>vercel/next.js</code></p>
      </div>

      <div class="field">
        <label class="field-label" for="qti-title">Title</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h10"></path>
          </svg>
          <input id="qti-title" name="title" class="input" type="text" placeholder="Issue title" data-field="title" maxlength="256">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="qti-labels">Labels</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12l9-9 9 9-9 9-9-9z"></path>
            <circle cx="9" cy="9" r="1.5"></circle>
          </svg>
          <input id="qti-labels" name="labels" class="input" type="text" placeholder="bug, docs, p1" autocomplete="off" spellcheck="false" data-field="labels">
        </div>
        <div class="chip-row" data-field="label-chips"></div>
        <div class="issue-type-row" data-issue-type-row role="radiogroup" aria-label="Issue type">
          <span class="issue-type-label">Type</span>
          <button class="issue-type-btn" type="button" data-action="set-issue-type" data-issue-type="bug" role="radio" aria-checked="false" title="Bug · adds preset labels">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="7" y="8" width="10" height="12" rx="5"></rect>
              <path d="M9 6l1.5 2"></path><path d="M15 6l-1.5 2"></path>
              <path d="M3 13h4"></path><path d="M17 13h4"></path>
              <path d="M3 18l4-2"></path><path d="M21 18l-4-2"></path>
              <path d="M3 8l4 2"></path><path d="M21 8l-4 2"></path>
            </svg>
            <span>Bug</span>
          </button>
          <button class="issue-type-btn" type="button" data-action="set-issue-type" data-issue-type="feature" role="radio" aria-checked="false" title="Feature · adds preset labels">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 2l2.5 5 5.5.8-4 3.9.9 5.5L12 14.8 7.1 17.2 8 11.7 4 7.8 9.5 7z"></path>
            </svg>
            <span>Feature</span>
          </button>
          <button class="issue-type-btn" type="button" data-action="set-issue-type" data-issue-type="question" role="radio" aria-checked="false" title="Question · adds preset labels">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M9.5 9.5a2.5 2.5 0 1 1 3.5 2.3c-.7.3-1 .8-1 1.5v.7"></path>
              <path d="M12 17.5h.01"></path>
            </svg>
            <span>Question</span>
          </button>
          <span class="issue-type-status" data-field="issue-type-status" hidden></span>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="qti-assignees">Assignees</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 21a8 8 0 0 1 16 0"></path>
          </svg>
          <input id="qti-assignees" name="assignees" class="input" type="text" placeholder="octocat, mojombo" autocomplete="off" spellcheck="false" data-field="assignees">
        </div>
        <div class="chip-row" data-field="assignee-chips"></div>
        <div class="defaults-row" data-defaults-row>
          <span class="defaults-status" data-field="defaults-status" data-state="empty">Enter a repo to save defaults.</span>
          <div class="defaults-actions">
            <button class="btn ghost btn-sm" type="button" data-action="apply-defaults" disabled title="Apply this repo's saved defaults">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12l4 4 10-10"></path></svg>
              <span>Apply</span>
            </button>
            <button class="btn ghost btn-sm" type="button" data-action="clear-defaults" disabled title="Remove saved defaults for this repo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12"></path><path d="M18 6L6 18"></path></svg>
              <span>Clear</span>
            </button>
            <button class="btn ghost btn-sm" type="button" data-action="save-defaults" disabled title="Save current labels + assignees as defaults for this repo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h11l4 4v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"></path><path d="M8 4v5h8"></path></svg>
              <span>Save as default</span>
            </button>
          </div>
        </div>
      </div>

      <div class="field" data-codeowners-row hidden>
        <div class="codeowners-row">
          <div class="quote-meta">
            <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7a3 3 0 0 1 3-3h7l6 6v10a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3z"></path>
              <path d="M14 4v6h6"></path>
              <circle cx="9" cy="15" r="2"></circle>
              <circle cx="15" cy="15" r="2"></circle>
              <path d="M11 15h2"></path>
            </svg>
            <span class="meta-label">CODEOWNERS</span>
            <span class="codeowners-count" data-field="codeowners-count" hidden></span>
          </div>
          <button class="chip-toggle" type="button" data-action="toggle-codeowners" aria-pressed="true" title="Auto-mention CODEOWNERS reviewers when submitting">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="7" width="18" height="10" rx="5"></rect>
              <circle cx="15" cy="12" r="3" data-field="codeowners-knob"></circle>
            </svg>
            <span data-field="codeowners-toggle-label">On</span>
          </button>
          <button class="icon-btn ghost codeowners-refresh" type="button" data-action="refresh-codeowners" title="Refresh CODEOWNERS" aria-label="Refresh CODEOWNERS">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 11a8 8 0 1 0-2.34 5.66"></path>
              <path d="M20 5v6h-6"></path>
            </svg>
          </button>
        </div>
        <p class="codeowners-status" data-field="codeowners-status" data-state="idle">Enter a repo to fetch CODEOWNERS.</p>
        <div class="codeowners-chips" data-field="codeowners-chips" hidden></div>
      </div>

      <div class="field" data-milestone-row>
        <label class="field-label">Milestone</label>
        <div class="milestone-row">
          <button class="btn ghost btn-sm milestone-picker" type="button" data-action="open-milestones" aria-haspopup="listbox" aria-expanded="false" title="Pick a milestone for this repo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 4h12l3 4-3 4H4z"></path>
              <path d="M4 4v16"></path>
            </svg>
            <span data-field="milestone-label">No milestone</span>
            <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
          </button>
          <button class="icon-btn ghost milestone-refresh" type="button" data-action="refresh-milestones" title="Refresh milestone list" aria-label="Refresh milestones">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 11a8 8 0 1 0-2.34 5.66"></path>
              <path d="M20 5v6h-6"></path>
            </svg>
          </button>
          <button class="icon-btn ghost milestone-clear" type="button" data-action="clear-milestone" title="Clear milestone" aria-label="Clear milestone" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12"></path><path d="M18 6L6 18"></path></svg>
          </button>
        </div>
        <div class="milestone-panel" data-milestone-panel role="listbox" hidden></div>
        <span class="milestone-status" data-field="milestone-status" data-state="idle">Enter a repo to pick a milestone.</span>
      </div>

      <div class="field">
        <div class="template-head">
          <button class="chip-toggle template-toggle" type="button" data-action="toggle-template" aria-expanded="false" title="Issue template for this repo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="4" y="3" width="16" height="18" rx="3"></rect>
              <path d="M8 8h8"></path><path d="M8 12h8"></path><path d="M8 16h5"></path>
            </svg>
            <span>Template</span>
            <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
          </button>
          <span class="template-status" data-field="template-status" data-state="empty">Enter a repo to manage its template.</span>
        </div>
        <div class="template-block" data-template-block hidden>
          <textarea class="input template-body" data-field="template-body" rows="7" spellcheck="false" placeholder="Issue body template for this repo. Use {{quote_blockquote}}, {{source_url}}, etc." maxlength="8000"></textarea>
          <p class="field-hint" data-field="template-hint">Placeholders: {{quote}}, {{quote_blockquote}}, {{source_title}}, {{source_url}}, {{section}}, {{captured}}, {{screenshot_note}}.</p>
          <div class="template-actions">
            <button class="btn ghost btn-sm" type="button" data-action="insert-default-template" title="Insert default template">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12h16"></path><path d="M12 4v16"></path></svg>
              <span>Default</span>
            </button>
            <button class="btn ghost btn-sm" type="button" data-action="clear-template" disabled title="Remove template for this repo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path></svg>
              <span>Remove</span>
            </button>
            <button class="btn primary btn-sm" type="button" data-action="save-template" disabled title="Save template for this repo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12l4 4 10-10"></path></svg>
              <span>Save template</span>
            </button>
          </div>
        </div>
      </div>

      <div class="field dup-field" data-dup-field hidden>
        <div class="dup-head">
          <div class="dup-head-title">
            <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-3.5-3.5"></path>
            </svg>
            <span>Similar issues</span>
            <span class="dup-count" data-field="dup-count" hidden></span>
          </div>
          <button class="icon-btn ghost dup-refresh" type="button" data-action="refresh-dups" title="Search for similar issues" aria-label="Refresh similar issues">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 11a8 8 0 1 0-2.34 5.66"></path>
              <path d="M20 5v6h-6"></path>
            </svg>
          </button>
        </div>
        <p class="dup-status" data-field="dup-status" data-state="idle">Type a title to scan for duplicates.</p>
        <ul class="dup-list" data-dup-list role="list" hidden></ul>
      </div>

      <div class="preview" data-preview hidden>
        <header class="preview-head">
          <span class="context-label">Body preview</span>
          <div class="preview-tabs" role="tablist" aria-label="Preview mode">
            <button class="preview-tab" type="button" role="tab" data-action="preview-mode" data-mode="rendered" aria-selected="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5h16"></path><path d="M4 12h10"></path><path d="M4 19h16"></path></svg>
              <span>Rendered</span>
            </button>

          <span class="recent-issues-count" data-field="recent-issues-count"></span>
          <button class="icon-btn ghost" type="button" data-action="clear-recent-issues" title="Clear history" aria-label="Clear history">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path>
              <path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path>
            </svg>
          </button>
        </div>
      </header>
      <ul class="recent-issues-list" data-recent-issues-list role="list"></ul>
    </section>
  </template>

  <template id="tpl-recent-issue-row">
    <li class="recent-issue-row" role="listitem">
      <a class="recent-issue-link" data-field="recent-issue-link">
        <span class="recent-issue-title" data-field="recent-issue-title"></span>
        <span class="recent-issue-meta">
          <span class="recent-issue-repo" data-field="recent-issue-repo"></span>
          <span class="recent-issue-number" data-field="recent-issue-number"></span>
          <span class="draft-dot" aria-hidden="true"></span>
          <span class="recent-issue-time" data-field="recent-issue-time"></span>
        </span>
      </a>
      <button class="recent-issue-remove" type="button" data-action="remove-recent-issue" aria-label="Remove from history" title="Remove from history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
        </svg>
      </button>
    </li>
  </template>

  <template id="tpl-offline-queue">
    <section class="offline-queue glass" data-offline-queue>
      <header class="offline-queue-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-3-6.7"></path>
            <path d="M21 4v5h-5"></path>
          </svg>
          <span class="meta-label">Offline queue</span>
          <span class="offline-online-dot" data-field="offline-online-dot" aria-hidden="true"></span>
        </div>
        <div class="offline-queue-actions">
          <span class="offline-queue-count" data-field="offline-queue-count"></span>
          <button class="icon-btn ghost" type="button" data-action="flush-offline-queue" title="Retry now" aria-label="Retry now">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7"></path>
              <path d="M3 4v5h5"></path>
            </svg>
          </button>
          <button class="icon-btn ghost" type="button" data-action="clear-offline-queue" title="Discard all queued issues" aria-label="Discard queue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path>
              <path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path>
            </svg>
          </button>
        </div>
      </header>
      <p class="offline-queue-blurb" data-field="offline-queue-status"></p>
      <ul class="offline-queue-list" data-offline-queue-list role="list"></ul>
    </section>
  </template>

  <template id="tpl-offline-queue-row">
    <li class="offline-queue-row" role="listitem">
      <div class="offline-row-main">
        <span class="offline-row-title" data-field="offline-row-title"></span>
        <span class="offline-row-meta">
          <span class="offline-row-repo" data-field="offline-row-repo"></span>
          <span class="draft-dot" aria-hidden="true"></span>
          <span data-field="offline-row-meta"></span>
        </span>
        <span class="offline-row-error" data-field="offline-row-error" hidden></span>
      </div>
      <button class="offline-row-remove" type="button" data-action="remove-offline-item" aria-label="Discard" title="Discard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
        </svg>
      </button>
    </li>
  </template>

  <template id="tpl-quote-history">
    <section class="quote-history glass" data-quote-history>
      <header class="quote-history-head">
        <div class="quote-meta">
          <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path>
          </svg>
          <span class="meta-label">Quote history</span>
        </div>
        <div class="quote-history-actions">
          <span class="quote-history-count" data-field="quote-history-count"></span>
          <button class="icon-btn ghost" type="button" data-action="clear-quote-history" title="Clear history" aria-label="Clear history">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path>
              <path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path>
            </svg>
          </button>
        </div>
      </header>
      <div class="quote-history-search">
        <svg viewBox="0 0 24 24" class="quote-history-search-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path>
        </svg>
        <input class="input quote-history-input" data-field="quote-history-query" type="search" placeholder="Search quote text, title, or repo" autocomplete="off" spellcheck="false" />
      </div>
      <p class="quote-history-status" data-field="quote-history-status" hidden></p>
      <ul class="quote-history-list" data-quote-history-list role="list"></ul>
    </section>
  </template>

  <template id="tpl-quote-history-row">
    <li class="quote-history-row" role="listitem">
      <a class="quote-history-link" data-field="quote-history-link" target="_blank" rel="noopener noreferrer">
        <span class="quote-history-title" data-field="quote-history-title"></span>
        <span class="quote-history-snippet" data-field="quote-history-snippet"></span>
        <span class="quote-history-meta">
          <span class="quote-history-repo" data-field="quote-history-repo"></span>
          <span class="quote-history-number" data-field="quote-history-number"></span>
          <span class="draft-dot" aria-hidden="true"></span>
          <span class="quote-history-time" data-field="quote-history-time"></span>
        </span>
      </a>
      <button class="quote-history-remove" type="button" data-action="remove-quote-history" aria-label="Remove from history" title="Remove from history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
        </svg>
      </button>
    </li>
  </template>

  <template id="tpl-annotator">
    <div class="annotator" data-annotator role="dialog" aria-modal="true" aria-label="Annotate screenshot">
      <div class="annotator-backdrop" data-action="annotator-cancel" aria-hidden="true"></div>
      <div class="annotator-panel glass">
        <header class="annotator-head">
          <div class="quote-meta">
            <svg viewBox="0 0 24 24" class="meta-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M14 4l6 6"></path>
              <path d="M4 20l4-1 11-11-3-3L5 16l-1 4z"></path>
            </svg>
            <span class="meta-label">Annotate</span>
          </div>
          <button class="icon-btn ghost" type="button" data-action="annotator-cancel" title="Cancel" aria-label="Cancel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
            </svg>
          </button>
        </header>

        <div class="annotator-toolbar" role="toolbar" aria-label="Annotation tools">
          <div class="annotator-tools" role="group" aria-label="Tool">
            <button class="tool-btn" type="button" data-tool="rect" data-active="true" title="Rectangle" aria-label="Rectangle tool" aria-pressed="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="4" y="5" width="16" height="14" rx="2"></rect>
              </svg>
              <span>Box</span>
            </button>
            <button class="tool-btn" type="button" data-tool="arrow" title="Arrow" aria-label="Arrow tool" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 19L19 5"></path>
                <path d="M11 5h8v8"></path>
              </svg>
              <span>Arrow</span>
            </button>
          </div>

          <div class="annotator-swatches" role="group" aria-label="Color">
            <button class="tool-swatch" type="button" data-color="#ef4444" data-active="true" aria-label="Red" aria-pressed="true" style="--swatch:#ef4444"></button>
            <button class="tool-swatch" type="button" data-color="#f59e0b" aria-label="Amber" aria-pressed="false" style="--swatch:#f59e0b"></button>
            <button class="tool-swatch" type="button" data-color="#10b981" aria-label="Green" aria-pressed="false" style="--swatch:#10b981"></button>
            <button class="tool-swatch" type="button" data-color="#3b82f6" aria-label="Blue" aria-pressed="false" style="--swatch:#3b82f6"></button>
          </div>

          <div class="annotator-spacer"></div>

          <button class="tool-btn ghost" type="button" data-action="annotator-undo" title="Undo" aria-label="Undo" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 14L4 9l5-5"></path>
              <path d="M4 9h10a6 6 0 0 1 0 12h-3"></path>
            </svg>
            <span>Undo</span>
          </button>
          <button class="tool-btn ghost" type="button" data-action="annotator-clear" title="Clear all" aria-label="Clear all" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path>
              <path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"></path>
            </svg>
            <span>Clear</span>
          </button>
        </div>

        <div class="annotator-canvas-wrap" data-field="annotator-canvas-wrap">
          <canvas class="annotator-canvas" data-field="annotator-canvas"></canvas>
        </div>

        <footer class="annotator-actions">
          <span class="annotator-hint" data-field="annotator-hint">Drag on the image to draw. Esc to cancel.</span>
          <div class="annotator-actions-right">
            <button class="btn ghost" type="button" data-action="annotator-cancel">
              <span>Cancel</span>
            </button>
            <button class="btn primary" type="button" data-action="annotator-save">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 13l4 4L19 7"></path>
              </svg>
              <span>Save</span>
            </button>
          </div>
        </footer>
      </div>
    </div>
  </template>

  <template id="tpl-palette">
    <div class="palette" data-palette role="dialog" aria-modal="true" aria-label="Command palette">
      <div class="palette-backdrop" data-action="palette-close" aria-hidden="true"></div>
      <div class="palette-panel glass" role="document">
        <div class="palette-search">
          <svg viewBox="0 0 24 24" class="palette-search-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20l-3.5-3.5"></path>
          </svg>
          <input class="palette-input" type="text" data-field="palette-input" placeholder="Type a command — repo, label, template, toggle…" autocomplete="off" spellcheck="false" role="combobox" aria-autocomplete="list" aria-expanded="true" aria-controls="qti-palette-list">
          <span class="palette-kbd" aria-hidden="true">esc</span>
        </div>
        <ul id="qti-palette-list" class="palette-list" data-field="palette-list" role="listbox"></ul>
        <footer class="palette-foot">
          <span class="palette-foot-hint"><span class="palette-kbd">↑</span><span class="palette-kbd">↓</span> navigate</span>
          <span class="palette-foot-hint"><span class="palette-kbd">↵</span> run</span>
          <span class="palette-foot-count" data-field="palette-count"></span>
        </footer>
      </div>
    </div>
  </template>

  <script type="module" src="popup.js"></script>
</body>
</html>
